<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Place Order | FoodHub</title>

<link rel="stylesheet" href="css/style.css">

<style>

.order-container{
display:flex;
justify-content:center;
align-items:center;
padding:50px 20px;
}

.order-box{
background:#1f2937;
padding:35px;
width:450px;
border-radius:20px;
box-shadow:0 0 20px rgba(255,152,0,0.3);
}

.order-box h2{
text-align:center;
color:#ff9800;
margin-bottom:25px;
}

.order-box input,
.order-box textarea,
.order-box select{
width:100%;
padding:12px;
margin:10px 0;
border:none;
border-radius:10px;
font-size:16px;
outline:none;
}

.order-box button{
width:100%;
padding:14px;
background:#ff9800;
color:white;
border:none;
border-radius:10px;
font-size:18px;
cursor:pointer;
transition:0.3s;
}

.order-box button:hover{
background:#ff7700;
}

.success-message{
text-align:center;
margin-top:20px;
font-size:20px;
font-weight:bold;
color:lightgreen;
}

</style>

</head>
<body>

<nav>
<div class="logo">🍔 FoodHub</div>

<ul>
<li><a href="index.html">Home</a></li>
<li><a href="menu.html">Menu</a></li>
<li><a href="about.html">About</a></li>
<li><a href="contact.html">Contact</a></li>
<li><a href="order.html">Order</a></li>
</ul>
</nav>

<h1 class="title" style="margin-top:40px;">
Place Your Order
</h1>

<div class="order-container">

<div class="order-box">

<h2>🍕 Food Order Form</h2>

<form onsubmit="placeOrder(event)">

<input
id="name"
type="text"
placeholder="Customer Name"
required>

<input
id="phone"
type="text"
placeholder="Phone Number"
required>

<textarea
id="address"
rows="3"
placeholder="Delivery Address"
required>
</textarea>

<input
id="food"
type="text"
placeholder="Food Item"
required>

<input
id="quantity"
type="number"
placeholder="Quantity"
required>

<select id="payment">
<option>Cash On Delivery</option>
<option>UPI Payment</option>
<option>Credit Card</option>
</select>

<button type="submit">
Confirm Order
</button>

</form>

<p id="message" class="success-message"></p>

</div>

</div>


<script>

function placeOrder(event){

event.preventDefault();

const order = {

name: document.getElementById("name").value,

phone: document.getElementById("phone").value,

address: document.getElementById("address").value,

food: document.getElementById("food").value,

quantity: document.getElementById("quantity").value,

payment: document.getElementById("payment").value

};


fetch("https://food-ordering-system-major-project-1.onrender.com/orders", {


method:"POST",

headers:{
"Content-Type":"application/json"
},

body:JSON.stringify(order)

})

.then(response => response.json())

.then(data => {
  console.log("SUCCESS");
  alert("SUCCESS");

document.getElementById("message").innerHTML =
"✅ Order Placed Successfully!";

alert("🎉 Thank You For Ordering From FoodHub!");

document.querySelector("form").reset();

})

.catch(error => {

alert("❌ Backend Server Not Running!");

});

}

</script>

</body>
</html>
